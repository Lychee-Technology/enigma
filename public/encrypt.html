<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypt Message</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body class="container">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="index.html">
            <h1>Enigma</h1>
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup"
            aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
                <a class="nav-item nav-link active" href="index.html">Home</a>
                <a class="nav-item nav-link" href="#"><b>Encryptor</b></a>
                <a class="nav-item nav-link" href="decrypt.html">Decryptor</a>
            </div>
        </div>
    </nav>
    <p>Your unencrypted messages and password will never leave your browser.</p>
    <div class="mb-1">
        <label class="form-label" for="inputText">
            <h3>Encrypted Message</h3>
        </label>
        <textarea class="form-control" id="inputText" name="inputText" rows="4"></textarea>
    </div>
    <div class="row mb-1 justify-content-start">
        <div class="col-md-1">
            <label class="col-form-label" for="password">Password</label>
        </div>
        <div class="col-md-11">
            <input class="form-control" type="password" id="password" name="password" />
        </div>
    </div>
    <div class="row mb-1 justify-content-end">
        <div class="col-auto">
            <button class="btn btn-primary" id="exec">Decrypt</button>
        </div>
    </div>
    <div class="mb-1">
        <label class="form-label" for="outputText">
            <h3>Decrypted Message</h3>
        </label>
        <textarea class="form-control" id="outputText" name="outputText" rows="4" readonly></textarea>
    </div>
    <div class="accordion" id="accordionExample">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne"
                    aria-expanded="false" aria-controls="collapseOne">
                    Password Generator by passwords-generator.org
                </button>
            </h2>
            <div id="collapseOne" class="accordion-collapse collapse">
                <div class="accordion-body">

                    <iframe id="iframe" src="https://passwords-generator.org/widget/"
                        style="width:100%;border:none;"></iframe>
                    <script>window.onmessage = (e => { e.data.hasOwnProperty("frameHeight") && (document.getElementById("iframe").style.height = `${e.data.frameHeight + 30}px`) });</script>
                </div>
            </div>
        </div>
    </div>
    <script src="js/crypto.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
