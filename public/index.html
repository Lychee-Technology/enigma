<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enigma</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body class="container">
    <div class="row align-items-center my-2">
        <div class="col-md-1 align-middle">
            <a class="navbar-brand" href="#">
                <h1>Enigma</h1>
            </a>
        </div>
        <div class="col-md-8 offset-md-1 align-middle">
            <ul class="nav nav-pills" id="pills-tab" role="tablist">
                <li class="nav-item mx-1" role="presentation">
                    <button class="nav-link active" id="pills-encryptor-tab" data-bs-toggle="pill"
                        data-bs-target="#pills-encryptor" type="button" role="tab" aria-controls="pills-encryptor"
                        aria-selected="true">Encryptor</button>
                </li>
                <li class="nav-item mx-1" role="presentation">
                    <button class="nav-link" id="pills-decryptor-tab" data-bs-toggle="pill"
                        data-bs-target="#pills-decryptor" type="button" role="tab" aria-controls="pills-decryptor"
                        aria-selected="false">Decryptor</button>
                </li>
            </ul>
        </div>
    </div>
    <div class="tab-content" id="pills-tabContent">
        <div class="tab-pane fade show active" id="pills-encryptor" role="tabpanel"
            aria-labelledby="pills-encryptor-tab" tabindex="0">
            <div class="mb-1">
                <label class="form-label" for="inputText">
                    <h3>Message</h3>
                </label>
                <textarea class="form-control" name="inputText" rows="4"></textarea>
            </div>
            <div class="row mb-1 justify-content-start">
                <div class="col-md-1">
                    <label class="col-form-label" for="password">Password</label>
                </div>
                <div class="col-md-11">
                    <input class="form-control" type="password" name="password" />
                </div>
            </div>
            <div class="row mb-1 justify-content-end">
                <div class="col-auto">
                    <button class="btn btn-primary" name="exec">Decrypt</button>
                </div>
            </div>
            <div class="mb-1">
                <label class="form-label" for="outputText">
                    <h3>Encrypted Message</h3>
                </label>
                <textarea class="form-control" name="outputText" rows="4" readonly></textarea>
            </div>
            <div class="accordion" id="passwords-generator">
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
                            Password Generator by passwords-generator.org
                        </button>
                    </h2>
                    <div id="collapseOne" class="accordion-collapse collapse">
                        <div class="accordion-body">
                            <iframe id="iframe" src="https://passwords-generator.org/widget/"
                                style="width:100%;border:none;"></iframe>
                            <script>window.onmessage = (e => { e.data.hasOwnProperty("frameHeight") && (document.getElementById("iframe").style.height = `${e.data.frameHeight + 30}px`) });</script>
                        </div>
                    </div>
                </div>
            </div>

        </div>
        <div class="tab-pane fade" id="pills-decryptor" role="tabpanel" aria-labelledby="pills-decryptor-tab"
            tabindex="0">
            <div class="mb-1">
                <label class="form-label" for="inputText">
                    <h3>Encrypted Message</h3>
                </label>
                <textarea class="form-control" id="inputText" name="inputText" rows="4"></textarea>
            </div>
            <div class="row mb-1 justify-content-start">
                <div class="col-md-1">
                    <label class="col-form-label" for="password">Password</label>
                </div>
                <div class="col-md-11">
                    <input class="form-control" type="password" id="password" name="password" />
                </div>
            </div>
            <div class="row justify-content-end">
                <div class="col-auto">
                    <button class="btn btn-primary" id="exec">Decrypt</button>
                </div>
            </div>
            <div>
                <label class="form-label" for="outputText">
                    <h3>Decrypted Message</h3>
                </label>
                <textarea class="form-control" id="outputText" name="outputText" rows="4" readonly></textarea>
            </div>
        </div>
    </div>
    <script src="js/crypto.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
