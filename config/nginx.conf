worker_processes                2;
user                            nginx;

events {
    use                         epoll;
    worker_connections          128;
}

http {
    server_tokens               off;
    include                     mime.types;
    charset                     utf-8;

    access_log                  /dev/stdout combined;
    error_log                   /dev/stderr warn;

    # Rate limiting zones
    # API: max 20 requests/minute per IP with a burst allowance of 10
    limit_req_zone $binary_remote_addr zone=enigma_api:10m rate=20r/m;
    # Static assets: max 60 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=enigma_web:10m rate=60r/m;

    server {
        listen                  443 ssl default_server;

        ssl_certificate         /usr/share/nginx/cert/_wildcard.enigma.local.pem;
        ssl_certificate_key     /usr/share/nginx/cert/_wildcard.enigma.local-key.pem;

        # Security response headers
        add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options       "nosniff" always;
        add_header X-Frame-Options              "DENY" always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://challenges.cloudflare.com https://static.cloudflareinsights.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https://www.google-analytics.com; connect-src 'self' https://cdn.jsdelivr.net https://www.google-analytics.com https://region1.google-analytics.com; frame-src https://passwords-generator.org https://challenges.cloudflare.com; font-src 'self' https://cdn.jsdelivr.net; object-src 'none'; base-uri 'self'; form-action 'self';" always;

        # prevent access to any PHP/ASP files for security
        location ~ \.(php|asp|aspx|jsp|xml)$ {
            return 301 https://www.lychee.technology;
        }

        location /health {
            proxy_pass          http://127.0.0.1:18080;
        }

        location /api/v1 {
            limit_except GET POST DELETE {
                deny all;
            }
            limit_req zone=enigma_api burst=10 nodelay;
            limit_req_status 429;

            if ($http_authorization !~ "^Turnstile") {
                return 401;
            }
            proxy_set_header    Host            $host;
            proxy_set_header    X-Real-IP       $http_cf_connecting_ip;
            proxy_set_header    X-Forwarded-For $remote_addr;

            # Preserve the original CF-Connecting-IP header
            proxy_set_header    CF-Connecting-IP $http_cf_connecting_ip;
            proxy_pass          http://127.0.0.1:18080;
        }

        location / {
            limit_except GET {
                deny all;
            }
            limit_req zone=enigma_web burst=20 nodelay;
            limit_req_status 429;

            gzip on;
            gzip_comp_level 5;
            gzip_min_length 256;
            gzip_proxied any;
            gzip_types application/javascript application/json application/xml text/css text/html text/plain;
            try_files $uri $uri/            /index.html;
            root                            /usr/share/nginx/html/public;
            index                           index.html;
            types {
               application/javascript       js mjs;
               application/json             json;
               application/xml              xml;
               text/css                     css;
               text/html                    html;
            }
        }
    }
}
