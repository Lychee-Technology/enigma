worker_processes                2;
user                            nginx;

events {
    use                         epoll;
    worker_connections          128;
}

http {
    server_tokens               off;
    include                     mime.types;
    charset                     utf-8;

    access_log                  /dev/stdout combined;
    error_log                   /dev/stderr warn;

    server {
        listen                  443 ssl default_server;

        ssl_certificate         /usr/share/nginx/cert/_wildcard.enigma.local.pem;
        ssl_certificate_key     /usr/share/nginx/cert/_wildcard.enigma.local-key.pem;

        # prevent access to any PHP/ASP files for security
        location ~ \.(php|asp|aspx|jsp)$ {
            return 301 https://www.lychee.technology;
        }

        location /api/v1 { 
            limit_except GET POST {
                deny all;
            }
            if ($http_authorization !~ "^Turnstile") {
                return 401;
            }
            proxy_set_header    Host            $host;
            proxy_set_header    X-Real-IP       $http_cf_connecting_ip;
            proxy_set_header    X-Forwarded-For $remote_addr;
    
            # Preserve the original CF-Connecting-IP header
            proxy_set_header    CF-Connecting-IP $http_cf_connecting_ip;
            proxy_pass          http://127.0.0.1:18080;
        }

        location / {
            limit_except GET {
                deny all;
            }
            gzip on;
            gzip_comp_level 5;
            gzip_min_length 256;
            gzip_proxied any;
            gzip_types application/javascript application/json application/xml text/css text/html text/plain;
            try_files $uri $uri/            /index.html;
            root                            /usr/share/nginx/html/public;
            index                           index.html;
            types {
               application/javascript       js mjs;
               application/json             json;
               application/xml              xml;
               text/css                     css;
               text/html                    html;
            }
        }
    }
}
